services:

  mongo:
    container_name: mongodb
    image: mongo
    restart: unless-stopped
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: mydb
    volumes:
      - ./scripts-mongo/:/docker-entrypoint-initdb.d/
      - mongodata:/data/db
      

volumes:
  mongodata:
