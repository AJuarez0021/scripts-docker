#version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/:/usr/local/etc/redis/redis.conf
      - redis_data:/data
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf

volumes:
  redis_data: