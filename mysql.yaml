#version: "3.8"

services: 
  mysql_server:
    container_name: mysql8
    image: mysql:8.0
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD=test123
      - MYSQL_DATABASE=my_database
    volumes:
      - ./scripts-mysql/:/docker-entrypoint-initdb.d/
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    
volumes:
  mysql_data: